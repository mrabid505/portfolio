<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Portfolio | Abid Mehmood{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Navigation -->
  <nav>
    <div class="nav-logo">&lt;<span>AbidMehmood</span>/&gt;</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#contact" class="nav-cta">Contact Me</a></li>
    </ul>
  </nav>

  <!-- Dot Navigation -->
  <div class="dot-nav" id="dotNav">
    <div class="dot active" onclick="goTo('#home')" title="Home"></div>
    <div class="dot" onclick="goTo('#about')" title="About"></div>
    <div class="dot" onclick="goTo('#skills')" title="Skills"></div>
    <div class="dot" onclick="goTo('#experience')" title="Experience"></div>
    <div class="dot" onclick="goTo('#contact')" title="Contact"></div>
  </div>

  {% block content %}{% endblock %}

  <footer>
    © 2024 <span>Abid Mehmood</span>. All systems nominal. &nbsp;·&nbsp; Built with Flask & ☕
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
